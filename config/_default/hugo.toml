baseURL = "https://critoracy.github.io/academis-demo/"
locale  = "en-US"
title   = "Academis Demo"

[taxonomies]
  tag    = "tags"
  author = "autori"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel   = 3

# Custom JSON output format.
# isPlainText = true: skip Hugo's HTML processor so JSON is not mangled.
# notAlternative = true: omit from <link rel="alternate"> tags.
[mediaTypes."application/json"]
  suffixes = ["json"]

[outputFormats.json]
  name           = "json"
  mediaType      = "application/json"
  baseName       = "index"
  isPlainText    = true
  notAlternative = true

[outputs]
  home     = ["HTML", "RSS", "json"]
  section  = ["HTML", "RSS", "json"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[module]
  [[module.imports]]
    path = "github.com/critoracy/Academis"
