baseURL = "https://critoracy.github.io/academis-demo/"
locale  = "en-US"
title   = "Academis Demo"

[taxonomies]
  tag    = "tags"
  author = "autori"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel   = 3

# Register the application/json media type explicitly so Hugo can
# resolve the .json suffix for template lookup.
[mediaTypes."application/json"]
  suffixes = ["json"]

# Define the JSON output format referencing the registered media type.
[outputFormats.JSON]
  mediaType      = "application/json"
  baseName       = "index"
  isPlainText    = true
  notAlternative = true

[outputs]
  home     = ["HTML", "RSS", "JSON"]
  section  = ["HTML", "RSS", "JSON"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[module]
  [[module.imports]]
    path = "github.com/critoracy/Academis"
