baseURL = "https://critoracy.github.io/academis-demo/"
locale  = "en-US"
title   = "Academis Demo"

[taxonomies]
  tag    = "tags"
  author = "autori"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel   = 3

# Required by announcements/list.json.html and layouts/index.json.html.
# isPlainText prevents Hugo from mangling JSON through its HTML processor.
# notAlternative keeps it out of <link rel="alternate"> tags.
[outputFormats.JSON]
  mediaType      = "application/json"
  baseName       = "index"
  isPlainText    = true
  notAlternative = true

[outputs]
  home     = ["HTML", "RSS", "JSON"]
  section  = ["HTML", "RSS", "JSON"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[module]
  [[module.imports]]
    path = "github.com/critoracy/Academis"
