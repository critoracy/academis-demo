baseURL = "https://critoracy.github.io/academis-demo/"
locale  = "en-US"
title   = "Academis Demo"

[taxonomies]
  tag    = "tags"
  author = "autori"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel   = 3

# Custom JSON output format — named "json" (lowercase) to avoid collision
# with Hugo's built-in "JSON" format. Hugo matches templates by file suffix
# (.json.html), so list.json.html and index.json.html are used automatically.
[outputFormats.json]
  mediaType      = "application/json"
  baseName       = "index"
  isPlainText    = true
  notAlternative = true

[outputs]
  home     = ["HTML", "RSS", "json"]
  section  = ["HTML", "RSS", "json"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]

[module]
  [[module.imports]]
    path = "github.com/critoracy/Academis"
