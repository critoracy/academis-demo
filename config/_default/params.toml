[brand]
  shortName   = "Academis"
  longName    = "Academis Demo"
  tagline     = "Knowledge. Criticism. Ideas."
  description = "A showcase publication built with the Academis Hugo theme — essays, announcements, an author feed with columns and notes, a CV section, and a serialised book."
  foundedYear = "2026"
  licenseText = "CC BY 4.0"
  licenseUrl  = "https://creativecommons.org/licenses/by/4.0/"

authorTaxonomy = "autori"

[editorial]
  mainSections = ["articles"]

[home]
  blocks     = ["feed", "explore"]
  feedLayout = "grid"
  feedHero   = true
  feedLimit  = 3

[donation]
  title       = "Support independent writing"
  description = "Academis Demo is free and open. If you find the work useful, a small contribution keeps it running."
  btn1_label  = "Make a contribution"
  btn1_href   = "https://example.com/donate"

[build]
  bundleCSS = true

# Announcements list: items per page (active grid + forever list)
announcementsPerPage = 4

# ── Global search section normalisation ──────────────────────────────────────
# Maps internal section slugs to canonical display names.
# Empty string = exclude from the section filter chip row.
[search.sectionAliases]
  articole   = "articles"
  carte      = "book"
  anunturi   = "announcements"
  autori     = ""        # covered by the Authors type chip
  search     = ""
  cauta      = ""
  personal   = ""        # legacy section, not in nav
  flux       = ""        # author feeds aggregated under /flux/
