name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_MODULE_PROXY: direct
      GONOSUMDB: "*"
      GONOSUMCHECK: "*"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure module access
        run: git config --global url."https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Pin to latest Academis experimental
        run: hugo mod get github.com/critoracy/Academis@experimental

      - name: Purge build cache
        run: |
          rm -rf public/
          rm -rf resources/_gen/

      - name: Build
        run: |
          hugo version
          hugo --minify 2>&1 | tee /tmp/hugo-build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hugo-build-log
          path: /tmp/hugo-build.log
          retention-days: 1

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: true
