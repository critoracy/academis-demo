about: |
  Historian and essayist based in Western Europe. I write on institutional
  history, the politics of evidence, and the long shadow of early-modern
  information technologies. I am completing a book on the epistemic consequences
  of the printing press in sixteenth-century Europe.

  At Academis Demo I serve as editor-in-chief. My editorial policy is simple:
  rigour over reach, argument over assertion.

experience:
  - role: "Part-Time Lecturer"
    company: "Department of History, University of Westmere"
    location: "Westmere"
    period: "2023 – present"
    description: |
      Teaching undergraduate modules on early-modern European history and
      a postgraduate seminar on historiographical method. Course design
      emphasises primary-source analysis and falsifiable argument construction.
    skills:
      - Historiographical method
      - Curriculum design
      - Academic writing

  - role: "Research Associate"
    company: "Institute for the Study of Information and Power"
    location: "Remote"
    period: "2021 – 2023"
    description: |
      Contributed to a three-year project on how institutional credibility
      was constructed and contested in pre-modern Europe. Responsible for
      archival research in German and French collections.
    skills:
      - Archival research
      - Comparative history
      - Grant writing

