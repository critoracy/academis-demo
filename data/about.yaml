intro:
  eyebrow: "Academis Theme"
  title: "Editorial content with substance"
  subtitle: "Structured, flexible, typographically considered."
  paragraphs:
    - >
      Academis is a Hugo theme designed for editorial publications that
      prioritise clarity, argument, and long-form depth over algorithmic
      engagement.
    - >
      The theme supports full-length articles with academic metadata,
      announcements with live status tracking, a personal feed with mixed
      content kinds, a YAML-driven CV section, and serialised books with
      chapter-by-chapter navigation.
